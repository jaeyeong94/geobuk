name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      - name: Install tools
        run: |
          brew install xcodegen create-dmg

      - name: Cache libghostty
        id: cache-libghostty
        uses: actions/cache@v4
        with:
          path: build/
          key: libghostty-release-${{ hashFiles('Vendor/ghostty/**/*.zig', 'Scripts/build-libghostty.sh') }}

      - name: Build libghostty
        if: steps.cache-libghostty.outputs.cache-hit != 'true'
        run: Scripts/build-libghostty.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild archive \
            -scheme Geobuk \
            -configuration Release \
            -archivePath build/Geobuk.xcarchive \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -quiet

      - name: Export .app
        run: |
          APP_PATH="build/Geobuk.xcarchive/Products/Applications/Geobuk.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Geobuk.app not found in archive"
            exit 1
          fi
          cp -R "$APP_PATH" build/Geobuk.app

      - name: Create DMG
        run: Scripts/create-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Geobuk v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            build/Geobuk-*.dmg
