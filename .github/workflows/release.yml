name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-and-release:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/zig
          key: zig-macos-aarch64-${{ env.ZIG_VERSION }}

      - name: Install Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-aarch64-macos-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          mkdir -p ~/zig
          tar -xf zig.tar.xz -C ~/zig --strip-components=1
          rm zig.tar.xz

      - name: Add Zig to PATH
        run: echo "$HOME/zig" >> "$GITHUB_PATH"

      - name: Install tools
        run: |
          brew install xcodegen create-dmg

      - name: Cache libghostty
        id: cache-libghostty
        uses: actions/cache@v4
        with:
          path: build/
          key: libghostty-release-${{ hashFiles('Vendor/ghostty/**/*.zig', 'Scripts/build-libghostty.sh') }}

      - name: Build libghostty
        if: steps.cache-libghostty.outputs.cache-hit != 'true'
        run: Scripts/build-libghostty.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild archive \
            -scheme Geobuk \
            -configuration Release \
            -archivePath build/Geobuk.xcarchive \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -quiet

      - name: Export .app
        run: |
          APP_PATH="build/Geobuk.xcarchive/Products/Applications/Geobuk.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Geobuk.app not found in archive"
            exit 1
          fi
          cp -R "$APP_PATH" build/Geobuk.app

      - name: Create DMG
        run: Scripts/create-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Geobuk v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            build/Geobuk-*.dmg
