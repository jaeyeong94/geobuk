name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/zig
          key: zig-macos-aarch64-${{ env.ZIG_VERSION }}

      - name: Install Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-aarch64-macos-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          mkdir -p ~/zig
          tar -xf zig.tar.xz -C ~/zig --strip-components=1
          rm zig.tar.xz

      - name: Add Zig to PATH
        run: echo "$HOME/zig" >> "$GITHUB_PATH"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache libghostty
        id: cache-libghostty
        uses: actions/cache@v4
        with:
          path: build/
          key: libghostty-${{ hashFiles('Vendor/ghostty/**/*.zig', 'Scripts/build-libghostty.sh') }}

      - name: Build libghostty
        if: steps.cache-libghostty.outputs.cache-hit != 'true'
        run: Scripts/build-libghostty.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -scheme Geobuk \
            -configuration Debug \
            -destination 'platform=macOS' \
            -quiet

      - name: Test
        run: |
          xcodebuild test \
            -scheme Geobuk \
            -configuration Debug \
            -destination 'platform=macOS' \
            -quiet \
            || echo "::warning::Tests failed or could not bootstrap"
